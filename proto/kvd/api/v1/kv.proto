syntax = "proto3";
package kvd.api.v1;

import "kvd/options.proto";

service Kv {
  option (kvd.options.service_id) = 1;

  rpc Get(GetRequest) returns (GetResponse) {
    option (kvd.options.method_id) = 1;
  }

  rpc Set(SetRequest) returns (SetResponse) {
    option (kvd.options.method_id) = 2;
  }

  rpc Del(DelRequest) returns (DelResponse) {
    option (kvd.options.method_id) = 3;
  }

  rpc Exists(ExistsRequest) returns (ExistsResponse) {
    option (kvd.options.method_id) = 4;
  }

  rpc Size(SizeRequest) returns (SizeResponse) {
    option (kvd.options.method_id) = 5;
  }
}

message GetRequest {
  string key = 1;
}

message GetResponse {
  optional bytes value = 1;
}

message SetRequest {
  string key = 1;
  bytes value = 2;
}

message SetResponse {
  bool applied = 1;
}

message DelRequest {
  string key = 1;
}

message DelResponse {
  bool removed = 1;
}

message ExistsRequest {
  string key = 1;
}

message ExistsResponse {
  bool exists = 1;
}

message SizeRequest {}

message SizeResponse {
  uint64 size = 1;
}